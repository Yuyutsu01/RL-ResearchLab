# Experiment settings for PPO Reward Shaping PBRS Strategy on CartPole-v1
experiment:
  name: "cartpole_pbrs"
  env_id: "CartPole-v1"
  total_timesteps: 100000
  eval_freq: 5000
  eval_episodes: 10
  checkpoint_freq: 20000
  seeds: [42, 43, 44, 45, 46]
  reproducibility:
    deterministic: true
    benchmark: false

# Stable-Baselines3 PPO Hyperparameters (Identical to baseline)
ppo:
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  device: "cpu"
  policy_kwargs:
    net_arch:
      pi: [64, 64]
      vf: [64, 64]

# Reward Shaping Strategy Settings
reward_shaping:
  strategy: "pbrs"
  params:
    position_weight: 0.1
    velocity_weight: 0.0
    angle_weight: 1.0
    angular_velocity_weight: 0.0
    gamma: 0.99
    potential_type: "l1"
