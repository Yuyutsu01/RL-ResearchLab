experiment:
  name: "ci_smoke_test"
  env_id: "CartPole-v1"
  total_timesteps: 500
  eval_freq: 250
  eval_episodes: 2
  checkpoint_freq: 500
  seeds: [42]
  reproducibility:
    deterministic: true
    benchmark: false

ppo:
  learning_rate: 0.0003
  n_steps: 256
  batch_size: 64
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  device: "cpu"
  policy_kwargs:
    net_arch:
      pi: [32, 32]
      vf: [32, 32]

reward_shaping:
  strategy: "identity"
  params: {}
