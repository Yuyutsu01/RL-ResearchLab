experiment:
  name: acrobot_smoke_test
  env_id: Acrobot-v1
  total_timesteps: 10000
  eval_freq: 2000
  eval_episodes: 5
  checkpoint_freq: 5000
  seeds:
  - 42
  - 43
  reproducibility:
    deterministic: true
    benchmark: false
ppo:
  learning_rate: 0.0003
  n_steps: 512
  batch_size: 64
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  device: cuda
  policy_kwargs:
    net_arch:
      pi:
      - 32
      - 32
      vf:
      - 32
      - 32
reward_shaping:
  strategy: pbrs
  params:
    height_weight: 1.0
    velocity_weight: 0.1
    gamma: 0.99
