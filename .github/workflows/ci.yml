name: PR & Push CI

on:
  push:
    branches: [ main, ci/cd-pipeline ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "reward-shaping-ppo/requirements-lock.txt"

      - name: Install Lint Tools
        run: |
          pip install --upgrade pip
          pip install ruff black

      - name: Ruff Lint Check
        working-directory: reward-shaping-ppo
        run: ruff check .

      - name: Black Format Check
        working-directory: reward-shaping-ppo
        run: black --check .

  static-analysis:
    name: Type Check & Config Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "reward-shaping-ppo/requirements-lock.txt"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          cd reward-shaping-ppo
          pip install -r requirements-lock.txt
          pip install mypy

      - name: MyPy Type Check
        working-directory: reward-shaping-ppo
        run: mypy .

      - name: Config Schema Validation
        working-directory: reward-shaping-ppo
        run: python scripts/config_validate.py

  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: [lint-and-format, static-analysis]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "reward-shaping-ppo/requirements-lock.txt"

      - name: Install Dependencies from Lockfile
        run: |
          pip install --upgrade pip
          cd reward-shaping-ppo
          pip install -r requirements-lock.txt
          pip install -e . --no-deps

      - name: Run Tests
        working-directory: reward-shaping-ppo
        run: pytest tests/ -v -m "not slow" --cov=. --cov-report=xml

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  smoke-test:
    name: Execution Smoke Test (500 steps)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "reward-shaping-ppo/requirements-lock.txt"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          cd reward-shaping-ppo
          pip install -r requirements-lock.txt

      - name: Run Smoke Test
        working-directory: reward-shaping-ppo
        run: python main.py --config configs/cartpole_smoke.yaml --mode all

      - name: Verify Artifacts
        working-directory: reward-shaping-ppo
        run: |
          test -f results/CartPole-v1/identity/seed_42/metadata.json
          test -f results/CartPole-v1/identity/seed_42/monitor.csv
          test -f results/CartPole-v1/identity/seed_42/evaluations.npz
          test -f plots/CartPole-v1/training_original_reward.png
          test -f ../docs/experiment_index.md
          test -f ../docs/project_journal.md
          test -f ../docs/experiments/identity/overview.md

  docker-smoke-build:
    name: Docker Smoke Build
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./reward-shaping-ppo
          file: ./reward-shaping-ppo/Dockerfile
          load: true
          tags: rl-researchlab:smoke-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Container Smoke Test
        run: docker run --rm rl-researchlab:smoke-test --config configs/cartpole_smoke.yaml --mode all
