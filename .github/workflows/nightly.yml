name: Nightly Benchmark Matrix

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  run-benchmarks:
    name: Run Benchmark Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "reward-shaping-ppo/requirements-lock.txt"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          cd reward-shaping-ppo
          pip install -r requirements-lock.txt

      # NOTE: baseline must run before dense — dense's analyze phase reads identity's results from this same workspace to output comparative stats.
      - name: Execute baseline study
        working-directory: reward-shaping-ppo
        run: python main.py --config configs/cartpole_baseline.yaml --mode all

      - name: Execute dense study
        working-directory: reward-shaping-ppo
        run: python main.py --config configs/cartpole_dense.yaml --mode all

      - name: Upload Research Results & Plots
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-plots-${{ github.run_id }}
          path: |
            reward-shaping-ppo/results/
            reward-shaping-ppo/plots/
            reward-shaping-ppo/paper_assets/

      - name: Upload Updated Autodoc Docs
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-docs-${{ github.run_id }}
          path: docs/
